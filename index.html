<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Monk Mod Store</title>

<!-- Auto Redirect After 8 Seconds -->
<meta http-equiv="refresh" content="8;url=https://openinapp.link/96er4aj">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    overflow:hidden;
}

.falcon-banner{
    width:100%;
    height:100vh;
    min-height:100dvh;
    background:linear-gradient(135deg,#0f172a,#111827,#1e293b);
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
    overflow:hidden;
}

.falcon-banner::before{
    content:"";
    position:absolute;
    width:60vw;
    height:60vw;
    background:#00d4ff;
    filter:blur(120px);
    left:-15%;
    top:-10%;
    opacity:.4;
    animation:move1 8s infinite alternate;
}

.falcon-banner::after{
    content:"";
    position:absolute;
    width:55vw;
    height:55vw;
    background:#7c3aed;
    filter:blur(120px);
    right:-15%;
    bottom:-10%;
    opacity:.4;
    animation:move2 8s infinite alternate;
}

.overlay{
    z-index:2;
    text-align:center;
    padding:25px;
    width:100%;
    max-width:500px;
    color:white;
}

.overlay h1{
    font-size:clamp(16px,4vw,24px);
    letter-spacing:4px;
}

.overlay h2{
    font-size:clamp(38px,10vw,72px);
    margin:14px 0;
    text-shadow:0 0 25px #00d4ff;
}

.overlay p{
    font-size:clamp(14px,4vw,18px);
    margin-bottom:30px;
    color:#d1d5db;
}

.redirect-text{
    font-size:14px;
    color:#9ca3af;
    margin-bottom:20px;
}

.start-btn{
    width:min(90vw,280px);
    height:68px;
    border:none;
    border-radius:22px;
    background:linear-gradient(90deg,#00d4ff,#2563eb,#7c3aed);
    color:#fff;
    font-size:20px;
    font-weight:bold;
    cursor:pointer;
    animation:pulse 1.2s infinite;
    box-shadow:0 0 35px rgba(0,212,255,.5);
}

.start-btn span{
    display:block;
    font-size:12px;
    margin-top:4px;
}

@keyframes pulse{
    50%{
        transform:scale(1.06);
    }
}

@keyframes move1{
    to{
        transform:translate(80px,60px);
    }
}

@keyframes move2{
    to{
        transform:translate(-80px,-60px);
    }
}
</style>
</head>

<body>

<div class="falcon-banner">
    <div class="overlay">

        <h1>WELCOME TO</h1>

        <h2>Monk Mod STORE</h2>

        <p>Premium Apps • Fast Download • Secure Store</p>

        <div class="redirect-text">
            You will be redirected automatically in a few seconds...
        </div>

        <a href="https://openinapp.link/96er4aj" target="_blank">
            <button class="start-btn">
                START NOW 🚀
                <span>Tap Here</span>
            </button>
        </a>

    </div>
</div>

<script>
setTimeout(function () {
    window.location.href = "https://openinapp.link/96er4aj";
}, 8000);
</script>

</body>
</html>
